spring:
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=InternshipDB;encrypt=true;trustServerCertificate=true
    username: sa
    password: 1234
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.SQLServerDialect
  sql:
    init:
      mode: never

logging:
  level:
    org.springframework.security: INFO
